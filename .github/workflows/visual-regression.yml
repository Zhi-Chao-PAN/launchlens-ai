name: Hosted visual regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  hosted-visual-regression:
    name: Hosted visual regression (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Render production build
        run: |
          npm run build
          nohup npx next start --hostname 127.0.0.1 --port 3011 > .next/visual-regression.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3011/api/workspaces >/dev/null 2>&1; then
              echo "ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Refresh hosted baselines
        run: npm run visual:regression -- --url 'http://127.0.0.1:3011' --tolerance 0.05 --update-baseline --report .visual-regression/hosted-baseline-report.json

      - name: Run hosted visual regression
        env:
          CI: "true"
        run: npm run visual:regression -- --url 'http://127.0.0.1:3011' --tolerance 0.05 --report .visual-regression/hosted-report.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: .visual-regression/hosted-report.json
          if-no-files-found: warn
