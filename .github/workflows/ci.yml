name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-type:
    name: Lint + Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

  eval:
    name: Provider + decision eval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Provider eval (mock, no secrets)
        run: npm run eval:provider

      - name: Decision eval (mock, no secrets)
        run: npm run eval:decision -- --write-history

      - name: Decision trend gate (5-run window, no drift beyond 5 points)
        run: npm run decision:history -- --window --size 5 --drift-threshold 5

      - name: Decision eval dashboard
        run: npm run decision:history -- --dashboard

      - name: Upload decision dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-dashboard
          path: docs/decision-dashboard.html
          if-no-files-found: warn

  build:
    name: Build + audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=moderate