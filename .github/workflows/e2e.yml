name: End-to-end (optional)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    if: ${{ vars.LAUNCHLENS_E2E_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e against live deployment
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.LAUNCHLENS_E2E_URL }}
          PLAYWRIGHT_NO_WEBSERVER: "1"
